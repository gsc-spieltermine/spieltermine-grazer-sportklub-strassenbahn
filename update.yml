
name: Build GSC ICS

on:
  schedule:
    - cron: "0 */6 * * *"  # alle 6 Stunden
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python generate_gsc_ics.py
      - name: Commit & push
        run: |
          git config user.name "calendar-bot"
          git config user.email "calendar-bot@users.noreply.github.com"
          git add docs/gsc_km_2025-26.ics || true
          git diff --quiet && echo "No changes" || (git commit -m "Update ICS" && git push)
